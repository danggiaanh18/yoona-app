<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6BCF7F">
    <title>YOONA MEMORY</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* MINI MUSIC PLAYER */
        .music-player {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px 20px;
            border-radius: 50px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 1000;
            font-family: 'Noto Sans', sans-serif;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .music-player:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
        }
        
        .music-player.playing {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .play-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .music-info {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        
        .music-title {
            font-weight: 600;
            font-size: 14px;
        }
        
        .music-status {
            font-size: 12px;
            opacity: 0.9;
        }
        
        /* ANIMATION */
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .playing .play-icon {
            animation: pulse 1.5s infinite;
        }
        
        /* RESPONSIVE */
        @media (max-width: 768px) {
            .music-player {
                bottom: 15px;
                right: 15px;
                padding: 12px 18px;
            }
            
            .play-icon {
                width: 35px;
                height: 35px;
                font-size: 18px;
            }
            
            .music-title {
                font-size: 13px;
            }
            
            .music-status {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <!-- MINI MUSIC PLAYER -->
    <div class="music-player" id="musicPlayer">
        <div class="play-icon" id="playIcon">🎵</div>
        <div class="music-info">
            <div class="music-title">Background Music</div>
            <div class="music-status" id="musicStatus">Click để phát nhạc</div>
        </div>
    </div>

    <!-- AUDIO -->
    <audio id="bgMusic" loop>
        <source src="/static/music/background.mp3" type="audio/mpeg">
    </audio>

    <div class="index-container">
        <img src="/static/images/idol/avatar.jpg" alt="YOONA" class="yoona-avatar">
        <div class="quote-text">Đang tải...</div>
        <button class="enter-btn">Vào xem kỷ niệm ✨</button>
    </div>
    
    <script src="/static/js/app.js"></script>
    
    <!-- MUSIC PLAYER SCRIPT -->
    <script>
        const music = document.getElementById('bgMusic');
        const musicPlayer = document.getElementById('musicPlayer');
        const playIcon = document.getElementById('playIcon');
        const musicStatus = document.getElementById('musicStatus');

        musicPlayer.addEventListener('click', function() {
            if (music.paused) {
                music.play().then(() => {
                    musicPlayer.classList.add('playing');
                    playIcon.textContent = '🔊';
                    musicStatus.textContent = 'Đang phát...';
                }).catch(err => {
                    console.error('Lỗi phát nhạc:', err);
                    musicStatus.textContent = 'Lỗi phát nhạc';
                });
            } else {
                music.pause();
                musicPlayer.classList.remove('playing');
                playIcon.textContent = '🎵';
                musicStatus.textContent = 'Đã tạm dừng';
            }
        });

        // Tự động phát khi người dùng tương tác với trang
        document.addEventListener('click', function autoPlay() {
            if (music.paused) {
                music.play().then(() => {
                    musicPlayer.classList.add('playing');
                    playIcon.textContent = '🔊';
                    musicStatus.textContent = 'Đang phát...';
                }).catch(() => {
                    // Không làm gì nếu lỗi
                });
            }
            document.removeEventListener('click', autoPlay);
        }, { once: true });
    </script>
</body>
</html>
