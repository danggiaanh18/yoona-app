<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOONA - A Cinematic Journey</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* ==================== RESET & BASE ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: #000;
            overflow: hidden;
            color: #fff;
        }

        /* ==================== HERO CONTAINER ==================== */
        .hero-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index: 9999;
            opacity: 1;
            transition: opacity 1.5s ease-out;
        }

        .hero-container.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        /* ==================== IMAGE LAYER ==================== */
        .hero-image-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            filter: blur(40px) brightness(0.4);
            transform: scale(1.1);
            opacity: 0.3;
            animation: dreamyReveal 4s cubic-bezier(0.4, 0, 0.2, 1) forwards;  /* ✅ 8s → 4s */
        }

        @keyframes dreamyReveal {
            0% {
                filter: blur(40px) brightness(0.4) saturate(0.5);
                transform: scale(1.1);
                opacity: 0.3;
            }
            40% {
                filter: blur(20px) brightness(0.7) saturate(0.8);
                transform: scale(1.05);
            }
            70% {
                filter: blur(8px) brightness(0.95) saturate(1);
                transform: scale(1.02);
            }
            100% {
                filter: blur(0px) brightness(1.1) saturate(1.1);
                transform: scale(1);
                opacity: 1;
            }
        }

        /* ==================== VIGNETTE OVERLAY ==================== */
        .vignette-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                ellipse at center,
                transparent 0%,
                transparent 60%,
                rgba(15, 12, 41, 0.3) 85%,
                rgba(15, 12, 41, 0.6) 100%
            );
            pointer-events: none;
            z-index: 2;
        }

        /* ==================== TITLE ANIMATION ==================== */
        .hero-title-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            opacity: 0;
            animation: titleFadeIn 2s ease-out 3s forwards;
        }

        @keyframes titleFadeIn {
            0% {
                opacity: 0;
                transform: translate(-50%, -40%);
                filter: blur(10px);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%);
                filter: blur(0px);
            }
        }

        .hero-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 700;
            letter-spacing: 0.15em;
            margin: 0;
            text-shadow: 
                0 0 40px rgba(255, 255, 255, 0.8),
                0 0 60px rgba(255, 255, 255, 0.5),
                0 2px 20px rgba(0, 0, 0, 0.9);
            animation: titleGlow 3s ease-in-out 4s infinite alternate;
        }

        @keyframes titleGlow {
            from {
                text-shadow: 
                    0 0 40px rgba(255, 255, 255, 0.8),
                    0 0 60px rgba(255, 255, 255, 0.5),
                    0 2px 20px rgba(0, 0, 0, 0.9);
            }
            to {
                text-shadow: 
                    0 0 50px rgba(255, 255, 255, 1),
                    0 0 80px rgba(255, 255, 255, 0.7),
                    0 0 100px rgba(255, 255, 255, 0.4),
                    0 2px 20px rgba(0, 0, 0, 0.9);
            }
        }

        .hero-subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1rem, 3vw, 1.5rem);
            font-weight: 300;
            letter-spacing: 0.3em;
            margin-top: 1rem;
            opacity: 0;
            animation: subtitleFadeIn 1.5s ease-out 4.5s forwards;
            text-transform: uppercase;
        }

        @keyframes subtitleFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 0.9;
                transform: translateY(0);
            }
        }

        .title-underline {
            width: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.9), transparent);
            margin: 1.5rem auto 0;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            animation: underlineExpand 1.5s ease-out 5s forwards;
        }

        @keyframes underlineExpand {
            from { width: 0; }
            to { width: 80%; }
        }

        /* ==================== SKIP BUTTON ==================== */
        .skip-button {
            position: absolute;
            bottom: 40px;
            right: 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 12px 24px;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            cursor: pointer;
            z-index: 20;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            animation: skipButtonFadeIn 0.5s ease-out 1.5s forwards;
        }

        @keyframes skipButtonFadeIn {
            to { opacity: 1; }
        }

        .skip-button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateX(-5px);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .skip-button:active {
            transform: scale(0.95) translateX(-5px);
        }

        /* ==================== MAIN CONTENT - CÓ ẢNH YOONA ==================== */
        .main-content {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* ✅ BACKGROUND VỚI ẢNH YOONA */
            background: 
                linear-gradient(135deg, rgba(26, 26, 46, 0.85) 0%, rgba(22, 33, 62, 0.9) 100%),
                url("{{ url_for('static', filename='images/idol/avatar.jpg') }}") center/cover no-repeat;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.5s ease-in;
            z-index: 1;
        }

        .main-content.show {
            opacity: 1;
            pointer-events: all;
        }

        /* ✅ THÊM OVERLAY ĐỂ TEXT DỄ ĐỌC */
        .main-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            z-index: 1;
        }

        .content-wrapper {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 3rem;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: contentSlideUp 1s ease-out;
            max-width: 600px;
        }

        @keyframes contentSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .content-wrapper h2 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            margin-bottom: 1rem;
            letter-spacing: 0.1em;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
        }

        .content-wrapper p {
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            margin-bottom: 2rem;
            opacity: 0.9;
            text-shadow: 0 1px 5px rgba(0, 0, 0, 0.8);
        }

        .enter-button {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #6BCF7F 0%, #4CAF50 100%);
            color: #fff;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            letter-spacing: 0.15em;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(107, 207, 127, 0.4);
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        .enter-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(107, 207, 127, 0.6);
        }

        .enter-button:active {
            transform: translateY(-1px);
        }

        /* ==================== MOBILE OPTIMIZATION ==================== */
        @media (max-width: 768px) {
            .skip-button {
                bottom: 20px;
                right: 20px;
                padding: 10px 20px;
                font-size: 0.8rem;
            }
            
            .hero-title {
                font-size: 2.5rem;
            }
            
            .hero-subtitle {
                font-size: 1rem;
            }

            .content-wrapper {
                padding: 2rem;
                margin: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Hero Container -->
    <div class="hero-container" id="heroContainer">
        <!-- Background Image -->
        <div class="hero-image-layer">
            <img src="{{ url_for('static', filename='images/idol/mylove.jpg') }}" 
                 alt="Yoona" 
                 class="hero-image"
                 id="heroImage"
                 onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=1920&q=80';">
        </div>
        
        <!-- Vignette -->
        <div class="vignette-overlay"></div>
        
        <!-- Title -->
        <div class="hero-title-container" id="heroTitle">
            <h1 class="hero-title">
                <span class="title-line">IM YOONA</span>
            </h1>
            <p class="hero-subtitle">A Cinematic Journey</p>
            <div class="title-underline"></div>
        </div>
        
        <!-- Skip Button -->
        <button class="skip-button" id="skipButton">
            <span>BỎ QUA</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
        </button>
    </div>

    <!-- ✅ MAIN CONTENT VỚI ẢNH YOONA BACKGROUND -->
    <div class="main-content" id="mainContent">
        <div class="content-wrapper">
            <h2>Welcome to Yoona Memory</h2>
            <p>Khám phá hành trình nghệ thuật của Im Yoona</p>
            <a href="/home" class="enter-button">Bắt đầu khám phá</a>
        </div>
    </div>

    <script>
        class HeroAnimation {
            constructor() {
                this.heroContainer = document.getElementById('heroContainer');
                this.mainContent = document.getElementById('mainContent');
                this.skipButton = document.getElementById('skipButton');
                this.heroImage = document.getElementById('heroImage');
                this.animationDuration = 8000;
                this.hasSkipped = false;
                
                this.init();
            }
            
            init() {
                // Check if already viewed
                if (sessionStorage.getItem('heroViewed')) {
                    this.skipAnimation();
                    return;
                }
                
                // Setup event listeners
                this.skipButton.addEventListener('click', () => this.skipAnimation());
                
                // Auto transition
                setTimeout(() => {
                    if (!this.hasSkipped) {
                        this.completeAnimation();
                    }
                }, this.animationDuration);
            }
            
            skipAnimation() {
                this.hasSkipped = true;
                this.completeAnimation();
            }
            
            completeAnimation() {
                sessionStorage.setItem('heroViewed', 'true');
                
                this.heroContainer.classList.add('fade-out');
                
                setTimeout(() => {
                    this.heroContainer.style.display = 'none';
                    this.mainContent.classList.add('show');
                }, 1500);
            }
        }
        
        // Initialize
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                new HeroAnimation();
            });
        } else {
            new HeroAnimation();
        }
    </script>
</body>
</html>
